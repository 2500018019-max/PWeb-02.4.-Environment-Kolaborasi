<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas tag ganti baris</title>
</head>
<body>
    <h2>Contoh Pindah Baris di HTML</h2>

    <!-- Menggunakan tag <p> untuk paragraf baru -->
    <p>Ini adalah paragraf pertama. Paragraf ini secara otomatis memberikan jarak di bawahnya.</p>
    
    <p>
        Ini adalah baris di dalam paragraf.<br>
        Ini adalah baris yang pindah ke bawah karena menggunakan tag <b>&lt;br&gt;</b>.<br>
        Dan ini baris ketiga di bawahnya lagi.
    </p>
</body>
</html>
